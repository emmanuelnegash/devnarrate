version: "3.9"
services:
  db:
    image: postgres:16
    container_name: devnarrate-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devnarrate
    ports:
      - "5432:5432"
    volumes:
      - devnarrate_pgdata:/var/lib/postgresql/data

volumes:
  devnarrate_pgdata: